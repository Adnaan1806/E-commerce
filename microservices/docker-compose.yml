version: '3.8'

services:

  # ── Infrastructure ─────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks: [ecommerce-network]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks: [ecommerce-network]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Microservices ──────────────────────────────────────────────

  order-service:
    build: ./order-service
    ports:
      - "8001:8000"
    environment:
      SERVICE_NAME: order-service
      PORT: 8000
      MONGO_URI: mongodb://mongodb:27017/orders_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      HONEYCOMB_API_KEY: ${HONEYCOMB_API_KEY}
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks: [ecommerce-network]
    restart: on-failure

  inventory-service:
    build: ./inventory-service
    ports:
      - "8002:8000"
    environment:
      SERVICE_NAME: inventory-service
      PORT: 8000
      MONGO_URI: mongodb://mongodb:27017/inventory_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      HONEYCOMB_API_KEY: ${HONEYCOMB_API_KEY}
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks: [ecommerce-network]
    restart: on-failure

  payment-service:
    build: ./payment-service
    ports:
      - "8003:8000"
    environment:
      SERVICE_NAME: payment-service
      PORT: 8000
      MONGO_URI: mongodb://mongodb:27017/payments_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      HONEYCOMB_API_KEY: ${HONEYCOMB_API_KEY}
      PAYMENT_FAILURE_RATE: "0.1"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks: [ecommerce-network]
    restart: on-failure

  notification-service:
    build: ./notification-service
    ports:
      - "8004:8000"
    environment:
      SERVICE_NAME: notification-service
      PORT: 8000
      MONGO_URI: mongodb://mongodb:27017/notifications_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      HONEYCOMB_API_KEY: ${HONEYCOMB_API_KEY}
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks: [ecommerce-network]
    restart: on-failure

networks:
  ecommerce-network:
    driver: bridge

volumes:
  mongo-data:
